services:
  expenses-api:
    build: .
    container_name: expenses-api
    ports:
      - "3000:3000"
    environment:
      - AI_MODEL_URL=http://model:11434
      - AI_MODEL_NAME=llava-phi3:latest
      - model
    networks:
      - ai-net

  model:
    image: ollama/ollama:latest
    container_name: ollama-model
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net

networks:
  ai-net:

volumes:
  ollama-data:
